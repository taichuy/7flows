name: Dependency Graph Submission

on:
  workflow_dispatch:
  schedule:
    - cron: '11 2 * * *'
  push:
    branches:
      - taichuy_dev
    paths:
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/pyproject.toml'
      - '**/uv.lock'
      - 'scripts/dependency-governance-actions.js'
      - 'scripts/submit-dependency-snapshots.js'
      - 'scripts/submit-dependency-snapshots.test.js'
      - '.github/workflows/dependency-graph-submission.yml'

jobs:
  submit-dependency-snapshots:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.submit.outputs.status }}
      submission_mode: ${{ steps.submit.outputs.submission_mode }}
      recommended_actions_count: ${{ steps.submit.outputs.recommended_actions_count }}
      recommended_actions_json: ${{ steps.submit.outputs.recommended_actions_json }}
      primary_recommended_action_priority: ${{ steps.submit.outputs.primary_recommended_action_priority }}
      primary_recommended_action_code: ${{ steps.submit.outputs.primary_recommended_action_code }}
      primary_recommended_action_audience: ${{ steps.submit.outputs.primary_recommended_action_audience }}
      primary_recommended_action_summary: ${{ steps.submit.outputs.primary_recommended_action_summary }}
      primary_recommended_action_rationale: ${{ steps.submit.outputs.primary_recommended_action_rationale }}
      primary_recommended_action_roots_json: ${{ steps.submit.outputs.primary_recommended_action_roots_json }}
      primary_recommended_action_href: ${{ steps.submit.outputs.primary_recommended_action_href }}
      primary_recommended_action_href_label: ${{ steps.submit.outputs.primary_recommended_action_href_label }}
      dependency_graph_setting_status: ${{ steps.submit.outputs.dependency_graph_setting_status }}
      automatic_dependency_submission_setting_status: ${{ steps.submit.outputs.automatic_dependency_submission_setting_status }}
      dependabot_security_updates_status: ${{ steps.submit.outputs.dependabot_security_updates_status }}
      repository_blocker_kind: ${{ steps.submit.outputs.repository_blocker_kind }}
      repository_blocker_status: ${{ steps.submit.outputs.repository_blocker_status }}
      repository_blocker_roots_json: ${{ steps.submit.outputs.repository_blocker_roots_json }}
      repository_security_and_analysis_missing_fields_json: ${{ steps.submit.outputs.repository_security_and_analysis_missing_fields_json }}
      repository_security_and_analysis_check_error: ${{ steps.submit.outputs.repository_security_and_analysis_check_error }}
      dependency_graph_visible_roots_json: ${{ steps.submit.outputs.dependency_graph_visible_roots_json }}
      dependency_graph_missing_roots_json: ${{ steps.submit.outputs.dependency_graph_missing_roots_json }}
      dependency_graph_check_error: ${{ steps.submit.outputs.dependency_graph_check_error }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Submit dependency snapshots
        id: submit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          node scripts/submit-dependency-snapshots.js --report-output dependency-submission.json | tee dependency-submission.txt
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"

          case "$status" in
            0)
              echo "Dependency snapshots submitted successfully."
              ;;
            2)
              echo "::warning::Dependency submission is blocked by repository security settings. Review the workflow summary and enable Dependency graph before retrying."
              ;;
            *)
              echo "::error::Dependency snapshot submission failed unexpectedly."
              exit "$status"
              ;;
          esac

      - name: Upload dependency submission report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-submission-report
          path: |
            dependency-submission.txt
            dependency-submission.json
