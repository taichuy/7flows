name: GitHub Security Drift

on:
  workflow_dispatch:
  schedule:
    - cron: '23 2 * * *'
  push:
    branches:
      - taichuy_dev
    paths:
      - '**/pyproject.toml'
      - '**/uv.lock'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - 'scripts/dependency-governance-actions.js'
      - 'scripts/check-dependabot-drift.js'
      - 'scripts/submit-dependency-snapshots.js'
      - '.github/workflows/github-security-drift.yml'
      - '.github/workflows/dependency-graph-submission.yml'

jobs:
  drift:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.drift.outputs.status }}
      conclusion_kind: ${{ steps.drift.outputs.conclusion_kind }}
      conclusion_exit_code: ${{ steps.drift.outputs.conclusion_exit_code }}
      recommended_actions_count: ${{ steps.drift.outputs.recommended_actions_count }}
      recommended_actions_json: ${{ steps.drift.outputs.recommended_actions_json }}
      primary_recommended_action_priority: ${{ steps.drift.outputs.primary_recommended_action_priority }}
      primary_recommended_action_code: ${{ steps.drift.outputs.primary_recommended_action_code }}
      primary_recommended_action_audience: ${{ steps.drift.outputs.primary_recommended_action_audience }}
      primary_recommended_action_summary: ${{ steps.drift.outputs.primary_recommended_action_summary }}
      primary_recommended_action_rationale: ${{ steps.drift.outputs.primary_recommended_action_rationale }}
      primary_recommended_action_roots_json: ${{ steps.drift.outputs.primary_recommended_action_roots_json }}
      primary_recommended_action_href: ${{ steps.drift.outputs.primary_recommended_action_href }}
      primary_recommended_action_href_label: ${{ steps.drift.outputs.primary_recommended_action_href_label }}
      dependency_graph_setting_status: ${{ steps.drift.outputs.dependency_graph_setting_status }}
      automatic_dependency_submission_setting_status: ${{ steps.drift.outputs.automatic_dependency_submission_setting_status }}
      dependabot_security_updates_status: ${{ steps.drift.outputs.dependabot_security_updates_status }}
      repository_blocker_kind: ${{ steps.drift.outputs.repository_blocker_kind }}
      repository_blocker_status: ${{ steps.drift.outputs.repository_blocker_status }}
      repository_security_and_analysis_missing_fields_json: ${{ steps.drift.outputs.repository_security_and_analysis_missing_fields_json }}
      repository_security_and_analysis_check_error: ${{ steps.drift.outputs.repository_security_and_analysis_check_error }}
      alerts_unavailable: ${{ steps.drift.outputs.alerts_unavailable }}
      open_alert_count: ${{ steps.drift.outputs.open_alert_count }}
      actionable_alert_count: ${{ steps.drift.outputs.actionable_alert_count }}
      dependency_submission_run_available: ${{ steps.drift.outputs.dependency_submission_run_available }}
      dependency_graph_missing_roots_json: ${{ steps.drift.outputs.dependency_graph_missing_roots_json }}
    permissions:
      actions: read
      contents: read
      security-events: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Verify GitHub CLI availability
        run: gh --version

      - name: Check Dependabot drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_ALERTS_TOKEN != '' && secrets.DEPENDABOT_ALERTS_TOKEN || github.token }}
          CHECK_DEPENDABOT_DRIFT_ALERTS_OPTIONAL: '1'
        shell: bash
        run: |
          set +e
          node scripts/check-dependabot-drift.js --report-output dependabot-drift.json | tee dependabot-drift.txt
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"

          case "$status" in
            0)
              echo "No open alert remains on the default branch."
              ;;
            1)
              echo "::error::At least one Dependabot alert is still actionable or unresolved."
              exit 1
              ;;
            2)
              echo "::warning::Dependabot open alerts drift from the current lockfile fact. Review the workflow summary and keep the evidence before dismissing alerts."
              ;;
            3)
              echo "::warning::Workflow token cannot read Dependabot alerts. Review the summary, and add DEPENDABOT_ALERTS_TOKEN if you want full drift comparison inside GitHub Actions."
              ;;
            *)
              echo "::error::Unexpected exit code: ${status}"
              exit "$status"
              ;;
          esac

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependabot-drift-report
          path: |
            dependabot-drift.txt
            dependabot-drift.json
