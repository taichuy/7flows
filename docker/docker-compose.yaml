services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sevenflows}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sevenflows}
    ports:
      - "${SEVENFLOWS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sevenflows}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    env_file:
      - ./.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sevenflows}
    ports:
      - "${SEVENFLOWS_REDIS_PORT:-6379}:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-sevenflows} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: always
    env_file:
      - ./.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${SEVENFLOWS_MINIO_PORT:-9000}:9000"
      - "${SEVENFLOWS_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./volumes/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      mc anonymous set private local/$${MINIO_BUCKET}
      "

  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    env_file:
      - ./.env
    environment:
      API_KEY: ${SANDBOX_API_KEY:-sevenflows-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-20}
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
      SANDBOX_PORT: 8194
    ports:
      - "${SEVENFLOWS_SANDBOX_PORT:-8194}:8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./sandbox/config.yaml:/conf/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      SEVENFLOWS_ENV: docker
      SEVENFLOWS_HOST: 0.0.0.0
      SEVENFLOWS_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${SEVENFLOWS_API_PORT:-8000}:8000"

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    command: celery -A app.core.celery_app.celery_app worker --loglevel INFO --pool solo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_started
    ports:
      - "${SEVENFLOWS_WEB_PORT:-3000}:3000"
