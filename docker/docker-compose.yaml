services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sevenflows}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sevenflows}
    ports:
      - "${SEVENFLOWS_POSTGRES_PORT:-35432}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sevenflows}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    env_file:
      - ./.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sevenflows}
    ports:
      - "${SEVENFLOWS_REDIS_PORT:-36379}:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-sevenflows} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    env_file:
      - ./.env
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_OBS_LOGGER_LEVEL: info
    ports:
      - "${SEVENFLOWS_RUSTFS_PORT:-39000}:9000"
      - "${SEVENFLOWS_RUSTFS_CONSOLE_PORT:-39001}:9001"
    volumes:
      - ./volumes/rustfs/data:/data
      - ./volumes/rustfs/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health && curl -fsS http://localhost:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    command: ["/data"]

  rustfs-init:
    image: amazon/aws-cli:2.17.38
    depends_on:
      rustfs:
        condition: service_healthy
    env_file:
      - ./.env
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://rustfs:9000 s3api list-buckets >/dev/null &&
      aws --endpoint-url http://rustfs:9000 s3 mb s3://$${RUSTFS_BUCKET} || true
      "
    environment:
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: us-east-1

  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    env_file:
      - ./.env
    environment:
      API_KEY: ${SANDBOX_API_KEY:-sevenflows-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-20}
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
      SANDBOX_PORT: 8194
    ports:
      - "${SEVENFLOWS_SANDBOX_PORT:-38194}:8194"
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./sandbox/config.yaml:/conf/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      SEVENFLOWS_ENV: docker
      SEVENFLOWS_HOST: 0.0.0.0
      SEVENFLOWS_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${SEVENFLOWS_API_PORT:-8000}:8000"

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    command: uv run celery -A app.core.celery_app.celery_app worker --loglevel INFO --pool solo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_started
    ports:
      - "${SEVENFLOWS_WEB_PORT:-3000}:3000"
