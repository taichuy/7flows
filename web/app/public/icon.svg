<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- 玻璃圆模糊滤镜 -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- 左侧倒立问号：天蓝色渐变（不透明） -->
    <linearGradient id="leftGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#7DD3FC" />
    </linearGradient>

    <!-- 左侧问号微投影 -->
    <filter id="shadowLeft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#38BDF8" flood-opacity="0.3" />
    </filter>

    <!-- 莹白翡翠绿发光滤镜 -->
    <filter id="jadeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景玻璃圆：半径放大至190，几乎充满画布 -->
  <circle cx="200" cy="200" r="190" fill="#DBEAFE" opacity="0.3" filter="url(#glassBlur)" stroke="#93C5FD" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- 倒立问号（左侧），天蓝色不透明，增大字号 -->
  <text x="120" y="200" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="320" 
        fill="url(#leftGradient)" 
        text-anchor="middle" 
        dominant-baseline="central"
        transform="rotate(180, 120, 200)"
        filter="url(#shadowLeft)">
    ?
  </text>

  <!-- 正向问号（右侧），仅保留加密加细的纯色虚线轮廓，无填充 -->
  <text x="280" y="200" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="320" 
        fill="none"
        stroke="#B2FFDA" 
        stroke-width="2" 
        stroke-dasharray="6 6" 
        stroke-linecap="round"
        text-anchor="middle" 
        dominant-baseline="central"
        opacity="1"
        filter="url(#jadeGlow)">
    ?
  </text>
</svg>